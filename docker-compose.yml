# CedarGraph - 一键部署配置
# 参考 NebulaGraph 的便捷部署设计
#
# 快速开始:
#   git clone https://github.com/cedargraph/cedar-docker-compose.git
#   cd cedar-docker-compose
#   docker-compose up -d
#
# 查看状态:
#   docker-compose ps
#
# 连接集群:
#   docker-compose exec console cedar-cli --host=graphd --port=9669

version: '3.8'

x-cedar-base: &cedar-base
  image: cedargraph/cedar:latest
  restart: unless-stopped
  networks:
    - cedar-net

services:
  # ============================================================================
  # Meta Service - 元数据服务 (3节点HA)
  # ============================================================================
  metad0:
    <<: *cedar-base
    container_name: cedar-metad-0
    hostname: metad0
    environment:
      - NODE_ROLE=metad
      - NODE_ID=0
      - META_PEERS=metad0:9559,metad1:9559,metad2:9559
    volumes:
      - ./data/meta0:/data/meta
      - ./logs/meta0:/logs
    ports:
      - "9559:9559"

  metad1:
    <<: *cedar-base
    container_name: cedar-metad-1
    hostname: metad1
    environment:
      - NODE_ROLE=metad
      - NODE_ID=1
      - META_PEERS=metad0:9559,metad1:9559,metad2:9559
    volumes:
      - ./data/meta1:/data/meta
      - ./logs/meta1:/logs
    depends_on:
      - metad0

  metad2:
    <<: *cedar-base
    container_name: cedar-metad-2
    hostname: metad2
    environment:
      - NODE_ROLE=metad
      - NODE_ID=2
      - META_PEERS=metad0:9559,metad1:9559,metad2:9559
    volumes:
      - ./data/meta2:/data/meta
      - ./logs/meta2:/logs
    depends_on:
      - metad0

  # ============================================================================
  # Storage Service - 存储服务
  # ============================================================================
  storaged0:
    <<: *cedar-base
    container_name: cedar-storaged-0
    hostname: storaged0
    environment:
      - NODE_ROLE=storaged
      - NODE_ID=0
      - META_SERVERS=metad0:9559,metad1:9559,metad2:9559
      - LOCAL_IP=storaged0
      - WS_IP=storaged0
    volumes:
      - ./data/storage0:/data/storage
      - ./logs/storage0:/logs
    ports:
      - "9779:9779"
      - "9780:9780"
    depends_on:
      - metad0
      - metad1
      - metad2

  storaged1:
    <<: *cedar-base
    container_name: cedar-storaged-1
    hostname: storaged1
    environment:
      - NODE_ROLE=storaged
      - NODE_ID=1
      - META_SERVERS=metad0:9559,metad1:9559,metad2:9559
      - LOCAL_IP=storaged1
      - WS_IP=storaged1
    volumes:
      - ./data/storage1:/data/storage
      - ./logs/storage1:/logs
    depends_on:
      - metad0
      - metad1
      - metad2
      - storaged0

  storaged2:
    <<: *cedar-base
    container_name: cedar-storaged-2
    hostname: storaged2
    environment:
      - NODE_ROLE=storaged
      - NODE_ID=2
      - META_SERVERS=metad0:9559,metad1:9559,metad2:9559
      - LOCAL_IP=storaged2
      - WS_IP=storaged2
    volumes:
      - ./data/storage2:/data/storage
      - ./logs/storage2:/logs
    depends_on:
      - metad0
      - metad1
      - metad2
      - storaged0

  # ============================================================================
  # Graph Service - 查询服务
  # ============================================================================
  graphd:
    <<: *cedar-base
    container_name: cedar-graphd
    hostname: graphd
    environment:
      - NODE_ROLE=graphd
      - META_SERVERS=metad0:9559,metad1:9559,metad2:9559
    volumes:
      - ./logs/graphd:/logs
    ports:
      - "9669:9669"     # 查询端口
      - "19669:19669"   # HTTP 端口
    depends_on:
      - metad0
      - metad1
      - metad2
      - storaged0
      - storaged1
      - storaged2

  # ============================================================================
  # Console - 命令行客户端 (内置)
  # ============================================================================
  console:
    <<: *cedar-base
    container_name: cedar-console
    environment:
      - NODE_ROLE=console
    command: ["sleep", "infinity"]
    depends_on:
      - graphd

  # ============================================================================
  # Studio - Web 可视化界面 (可选)
  # ============================================================================
  studio:
    image: cedargraph/studio:latest
    container_name: cedar-studio
    environment:
      - CEDAR_GRAPHD_HOST=graphd
      - CEDAR_GRAPHD_PORT=9669
    ports:
      - "7001:7001"
    networks:
      - cedar-net
    depends_on:
      - graphd
    profiles:
      - studio

networks:
  cedar-net:
    driver: bridge
