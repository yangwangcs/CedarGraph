# CedarGraph Minimal Docker Compose (without monitoring)

services:
  metad0:
    image: ubuntu:22.04
    container_name: cedar-metad-0
    hostname: metad0
    command: ["sleep", "infinity"]
    volumes:
      - ./data/meta0:/data/meta
    ports:
      - "19559:9559"
    networks:
      - cedar-net

  metad1:
    image: ubuntu:22.04
    container_name: cedar-metad-1
    hostname: metad1
    command: ["sleep", "infinity"]
    depends_on:
      - metad0
    volumes:
      - ./data/meta1:/data/meta
    networks:
      - cedar-net

  metad2:
    image: ubuntu:22.04
    container_name: cedar-metad-2
    hostname: metad2
    command: ["sleep", "infinity"]
    depends_on:
      - metad0
    volumes:
      - ./data/meta2:/data/meta
    networks:
      - cedar-net

  storaged0:
    image: ubuntu:22.04
    container_name: cedar-storaged-0
    hostname: storaged0
    command: ["sleep", "infinity"]
    depends_on:
      - metad0
      - metad1
      - metad2
    volumes:
      - ./data/storage0:/data/storage
    ports:
      - "19779:9779"
    networks:
      - cedar-net

  storaged1:
    image: ubuntu:22.04
    container_name: cedar-storaged-1
    hostname: storaged1
    command: ["sleep", "infinity"]
    depends_on:
      - storaged0
    volumes:
      - ./data/storage1:/data/storage
    networks:
      - cedar-net

  storaged2:
    image: ubuntu:22.04
    container_name: cedar-storaged-2
    hostname: storaged2
    command: ["sleep", "infinity"]
    depends_on:
      - storaged0
    volumes:
      - ./data/storage2:/data/storage
    networks:
      - cedar-net

  graphd:
    image: ubuntu:22.04
    container_name: cedar-graphd
    hostname: graphd
    command: ["sleep", "infinity"]
    depends_on:
      - storaged0
      - storaged1
      - storaged2
    ports:
      - "19669:9669"
    networks:
      - cedar-net

networks:
  cedar-net:
    driver: bridge
