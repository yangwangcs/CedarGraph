// =============================================================================
// Raft Protocol - gRPC Interface for Embedded Raft
// =============================================================================

syntax = "proto3";

package cedar.dtx.raft.grpc;

option cc_generic_services = false;

// =============================================================================
// Core Types
// =============================================================================

message GrpcLogEntry {
  uint64 term = 1;
  uint64 index = 2;
  bytes data = 3;
}

// =============================================================================
// Vote RPC
// =============================================================================

message GrpcVoteRequest {
  uint64 term = 1;
  uint32 candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message GrpcVoteResponse {
  uint64 term = 1;
  bool vote_granted = 2;
}

// =============================================================================
// AppendEntries RPC
// =============================================================================

message GrpcAppendEntriesRequest {
  uint64 term = 1;
  uint32 leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated GrpcLogEntry entries = 5;
  uint64 leader_commit = 6;
}

message GrpcAppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
  uint64 match_index = 3;  // For optimization
}

// =============================================================================
// InstallSnapshot RPC (streaming for large snapshots)
// =============================================================================

message GrpcSnapshotMetadata {
  uint64 last_included_term = 1;
  uint64 last_included_index = 2;
}

message GrpcInstallSnapshotRequest {
  uint64 term = 1;
  uint32 leader_id = 2;
  GrpcSnapshotMetadata metadata = 3;
  bytes data = 4;
  uint32 offset = 5;
  bool done = 6;
}

message GrpcInstallSnapshotResponse {
  uint64 term = 1;
  bool success = 2;
}

// =============================================================================
// Raft Service
// =============================================================================

service RaftService {
  // RequestVote is invoked by candidates to gather votes
  rpc RequestVote(GrpcVoteRequest) returns (GrpcVoteResponse);
  
  // AppendEntries is invoked by leader to replicate log entries
  // Also used as heartbeat
  rpc AppendEntries(GrpcAppendEntriesRequest) returns (GrpcAppendEntriesResponse);
  
  // InstallSnapshot is invoked by leader to send snapshots to slow followers
  rpc InstallSnapshot(stream GrpcInstallSnapshotRequest) returns (GrpcInstallSnapshotResponse);
}
