syntax = "proto3";

package cedar.migration;

// ============================================================================
// Migration Status Enumeration
// ============================================================================

enum MigrationStatus {
  PENDING = 0;
  PREPARING = 1;
  SYNCING = 2;
  CATCHING_UP = 3;
  FINALIZING = 4;
  COMPLETED = 5;
  FAILED = 6;
  ROLLED_BACK = 7;
}

// ============================================================================
// Start Migration Request/Response
// ============================================================================

message StartMigrationRequest {
  uint32 partition_id = 1;
  string source_node = 2;
  string target_node = 3;
  string target_address = 4;
  uint64 estimated_data_size = 5;
}

message StartMigrationResponse {
  bool success = 1;
  string error_msg = 2;
  string migration_id = 3;
}

// ============================================================================
// Sync Data Request/Response (Streaming)
// ============================================================================

message SyncDataRequest {
  string migration_id = 1;
  uint32 partition_id = 2;
  uint64 offset = 3;
  bytes data = 4;
  bool is_snapshot = 5;
  uint64 checksum = 6;
}

message SyncDataResponse {
  bool success = 1;
  string error_msg = 2;
  uint64 bytes_received = 3;
}

// ============================================================================
// Finalize Migration Request/Response
// ============================================================================

message FinalizeMigrationRequest {
  string migration_id = 1;
  uint32 partition_id = 2;
  bool commit = 3;
}

message FinalizeMigrationResponse {
  bool success = 1;
  string error_msg = 2;
  MigrationStatus final_status = 3;
}

// ============================================================================
// Replicate WAL Entry Request/Response
// ============================================================================

message ReplicateWALEntryRequest {
  string migration_id = 1;
  uint32 partition_id = 2;
  uint64 timestamp = 3;
  uint64 txn_id = 4;
  bytes op_data = 5;
}

message ReplicateWALEntryResponse {
  bool success = 1;
  string error_msg = 2;
}

// ============================================================================
// Get Migration Status Request/Response
// ============================================================================

message GetMigrationStatusRequest {
  string migration_id = 1;
}

message GetMigrationStatusResponse {
  bool success = 1;
  MigrationStatus status = 2;
  uint64 bytes_transferred = 3;
  uint64 bytes_total = 4;
  uint32 progress_percent = 5;
  string error_msg = 6;
}

// ============================================================================
// Partition Migration Service
// ============================================================================

service PartitionMigrationService {
  // Start a new partition migration
  rpc StartMigration(StartMigrationRequest) returns (StartMigrationResponse);
  
  // Stream data from source to target
  rpc SyncData(stream SyncDataRequest) returns (SyncDataResponse);
  
  // Replicate a single WAL entry during catch-up phase
  rpc ReplicateWALEntry(ReplicateWALEntryRequest) returns (ReplicateWALEntryResponse);
  
  // Finalize migration (commit or rollback)
  rpc FinalizeMigration(FinalizeMigrationRequest) returns (FinalizeMigrationResponse);
  
  // Get current migration status
  rpc GetMigrationStatus(GetMigrationStatusRequest) returns (GetMigrationStatusResponse);
}
