syntax = "proto3";

package cedar.storage;

// StorageD - 分布式存储节点服务

// ============================================================================
// 基础类型
// ============================================================================

message CedarKey {
    uint64 entity_id = 1;
    uint64 timestamp = 2;
    uint64 target_id = 3;
    uint32 column_id = 4;
    uint32 sequence = 5;
    uint32 type_flags = 6;
    uint32 partition_id = 7;
    uint32 entity_type = 8;  // explicit 0=Vertex, 1=EdgeOut, 2=EdgeIn
}

message Descriptor {
    bytes data = 1;  // 序列化的 Descriptor
}

message Timestamp {
    uint64 value = 1;
}

enum Direction {
    OUTGOING = 0;
    INCOMING = 1;
    BOTH = 2;
}

// ============================================================================
// Put 请求/响应
// ============================================================================

message PutRequest {
    CedarKey key = 1;
    Descriptor value_descriptor = 2;
    Timestamp txn_version = 3;
    uint64 txn_id = 4;  // 分布式事务ID
}

message PutResponse {
    bool success = 1;
    string error_msg = 2;
}

// ============================================================================
// Get 请求/响应
// ============================================================================

message GetRequest {
    CedarKey key = 1;
}

message GetResponse {
    bool success = 1;
    string error_msg = 2;
    Descriptor value_descriptor = 3;
    bool found = 4;
}

// ============================================================================
// Delete 请求/响应
// ============================================================================

message DeleteRequest {
    CedarKey key = 1;
    Timestamp txn_version = 2;
    uint64 txn_id = 3;
}

message DeleteResponse {
    bool success = 1;
    string error_msg = 2;
}

// ============================================================================
// Scan 请求/响应
// ============================================================================

message ScanRequest {
    uint64 entity_id = 1;
    uint64 start_time = 2;
    uint64 end_time = 3;
    uint32 partition_id = 4;  // 用于分区验证
}

message ScanResponse {
    bool success = 1;
    string error_msg = 2;
    repeated TimestampedDescriptor items = 3;
}

message TimestampedDescriptor {
    uint64 timestamp = 1;
    Descriptor value_descriptor = 2;
}

// ============================================================================
// 批量操作
// ============================================================================

message BatchPutRequest {
    message Item {
        CedarKey key = 1;
        Descriptor value_descriptor = 2;
    }
    repeated Item items = 1;
    Timestamp txn_version = 2;
    uint64 txn_id = 3;
}

message BatchPutResponse {
    bool success = 1;
    string error_msg = 2;
    repeated bool item_success = 3;  // 每个条目的成功状态
}

message BatchGetRequest {
    repeated CedarKey keys = 1;
}

message BatchGetResponse {
    bool success = 1;
    string error_msg = 2;
    repeated Descriptor descriptors = 3;  // 与请求顺序一致，未找到为空
    repeated bool found = 4;
}

// ============================================================================
// 分布式事务支持 (2PC)
// ============================================================================

// Prepare 阶段
message PrepareRequest {
    uint64 txn_id = 1;
    repeated CedarKey read_set = 2;
    repeated CedarKey write_set = 3;
    uint64 commit_ts = 4;
    map<uint64, Descriptor> write_descriptors = 5;  // key hash -> descriptor
    uint64 read_timestamp = 6;  // Snapshot timestamp for read-set validation
}

message PrepareResponse {
    bool prepared = 1;  // true = Prepared, false = Abort
    string error_msg = 2;
    uint64 prepared_ts = 3;
}

// Commit 阶段
message CommitRequest {
    uint64 txn_id = 1;
    uint64 commit_ts = 2;
}

message CommitResponse {
    bool success = 1;
    string error_msg = 2;
}

// Abort 阶段
message AbortRequest {
    uint64 txn_id = 1;
}

message AbortResponse {
    bool success = 1;
    string error_msg = 2;
}

// Inquire 阶段（协调者恢复时查询 participant 状态）
message InquireRequest {
    uint64 txn_id = 1;
}

message InquireResponse {
    uint64 txn_id = 1;
    enum TxnState {
        UNKNOWN = 0;
        PREPARED = 1;
        COMMITTED = 2;
        ABORTED = 3;
        INCONSISTENT = 4;
    }
    TxnState state = 2;
    string error_msg = 3;
}

// ============================================================================
// 分区管理
// ============================================================================

message PartitionInfo {
    uint32 partition_id = 1;
    uint64 data_size = 2;
    uint64 key_count = 3;
    uint64 qps = 4;
    bool is_leader = 5;
    string raft_role = 6;  // LEADER, FOLLOWER, CANDIDATE
}

message GetPartitionInfoRequest {
    uint32 partition_id = 1;
}

message GetPartitionInfoResponse {
    bool success = 1;
    string error_msg = 2;
    PartitionInfo info = 3;
}

// ============================================================================
// 心跳/健康检查
// ============================================================================

message HeartbeatRequest {
    uint32 node_id = 1;
    repeated PartitionInfo partitions = 2;
    double cpu_usage = 3;
    double memory_usage = 4;
}

message HeartbeatResponse {
    bool success = 1;
    string error_msg = 2;
    // 可以返回来自 MetaD 的指令
    bool should_transfer_leaders = 3;
    repeated uint32 transfer_partitions = 4;
}

// ============================================================================
// Predicate Pushdown (Filter Pushdown)
// ============================================================================

enum PredicateOp {
    EQ = 0;
    NE = 1;
    LT = 2;
    LE = 3;
    GT = 4;
    GE = 5;
    IN = 6;
}

message PropertyPredicate {
    string property_name = 1;
    PredicateOp op = 2;
    bytes serialized_value = 3;  // serialized cypher::Value
}

message ScanPredicate {
    oneof predicate {
        PropertyPredicate property = 1;
        // Future: composite AND/OR predicates
    }
}

message ScanRequestV2 {
    uint64 entity_id = 1;
    uint64 start_time = 2;
    uint64 end_time = 3;
    uint32 partition_id = 4;
    repeated ScanPredicate predicates = 5;  // AND semantics
}

message ScanNodeRequestV2 {
    uint64 node_id = 1;
    uint64 start_time = 2;
    uint64 end_time = 3;
    uint32 partition_id = 4;
    repeated ScanPredicate predicates = 5;
}

message ScanEdgeRequestV2 {
    uint64 node_id = 1;        // start node for traversal
    uint32 edge_type = 2;
    Direction direction = 3;
    uint64 start_time = 4;
    uint64 end_time = 5;
    uint32 partition_id = 6;
    repeated ScanPredicate predicates = 7;
}

// ============================================================================
// StorageD 服务
// ============================================================================

service StorageService {
    // 基础读写
    rpc Put(PutRequest) returns (PutResponse);
    rpc Get(GetRequest) returns (GetResponse);
    rpc Delete(DeleteRequest) returns (DeleteResponse);
    rpc Scan(ScanRequest) returns (ScanResponse);
    
    // Predicate pushdown scans
    rpc ScanNodeV2(ScanNodeRequestV2) returns (ScanResponse);
    rpc ScanEdgeV2(ScanEdgeRequestV2) returns (ScanResponse);
    
    // 批量操作
    rpc BatchPut(BatchPutRequest) returns (BatchPutResponse);
    rpc BatchGet(BatchGetRequest) returns (BatchGetResponse);
    
    // 2PC 分布式事务
    rpc Prepare(PrepareRequest) returns (PrepareResponse);
    rpc Commit(CommitRequest) returns (CommitResponse);
    rpc Abort(AbortRequest) returns (AbortResponse);
    rpc Inquire(InquireRequest) returns (InquireResponse);
    
    // 分区管理
    rpc GetPartitionInfo(GetPartitionInfoRequest) returns (GetPartitionInfoResponse);
    
    // 数据持久化
    rpc Flush(FlushRequest) returns (FlushResponse);
    
    // GCN compute-optimized APIs
    rpc GetRangeForCompute(GetRangeForComputeRequest) returns (GetRangeForComputeResponse);
    rpc GetCommittedVersion(GetCommittedVersionRequest) returns (GetCommittedVersionResponse);

    // QueryD sub-query execution (Adaptive Execution Path)
    rpc ExecuteSubQuery(ExecuteSubQueryRequest) returns (stream SubQueryResultBatch);

    // 心跳（流式，StorageD 定期上报）
    rpc Heartbeat(stream HeartbeatRequest) returns (stream HeartbeatResponse);

    // 备份恢复
    rpc CreateBackup(CreateBackupRequest) returns (CreateBackupResponse);
    rpc RestoreFromBackup(RestoreFromBackupRequest) returns (RestoreFromBackupResponse);
    rpc ListBackups(ListBackupsRequest) returns (ListBackupsResponse);

    // 热点检测
    rpc GetHotSpots(GetHotSpotsRequest) returns (GetHotSpotsResponse);
    rpc ResetHotSpotStats(ResetHotSpotStatsRequest) returns (ResetHotSpotStatsResponse);

    // 存储容量监控
    rpc GetStorageCapacity(GetStorageCapacityRequest) returns (GetStorageCapacityResponse);

    // Label-based batch entity scan
    rpc ScanLabel(ScanLabelRequest) returns (ScanLabelResponse);
}

// Flush 请求/响应
message FlushRequest {
    uint32 partition_id = 1;
    bool wait = 2;  // 是否等待 flush 完成
}

message FlushResponse {
    bool success = 1;
    string error_msg = 2;
    uint64 flushed_size = 3;  // 刷新的数据大小
}

// ============================================================================
// GCN Compute-Optimized APIs
// ============================================================================

message GetRangeForComputeRequest {
    uint64 entity_id = 1;
    uint32 edge_type = 2;
    uint64 snapshot_ts = 3;
    uint32 direction = 4; // 0=out, 1=in
    uint64 required_version = 5;
}

message ComputeEdge {
    uint64 target_id = 1;
    uint64 valid_from = 2;
    uint64 valid_to = 3;
    uint32 edge_type = 4;
}

message GetRangeForComputeResponse {
    repeated ComputeEdge edges = 1;
    uint64 served_version = 2;
    bool truncated = 3;
}

message GetCommittedVersionRequest {}

message GetCommittedVersionResponse {
    uint64 committed_version = 1;
    uint64 watermark = 2;
}

// Sub-query execution for Adaptive Execution Path (AEP)
message QueryValue {
    oneof value_type {
        bool bool_val = 1;
        int64 int_val = 2;
        double float_val = 3;
        string string_val = 4;
    }
}

message QueryRow {
    repeated QueryValue values = 1;
}

message ExecuteSubQueryRequest {
    string query_fragment = 1;
    map<string, QueryValue> parameters = 2;
    uint32 partition_id = 3;
    bytes plan_fingerprint = 4;
    bool accept_streaming = 5;
}

message SubQueryResultBatch {
    repeated QueryRow records = 1;
    repeated string columns = 2;
    bool is_last = 3;
}

// ============================================================================
// 备份恢复
// ============================================================================

message CreateBackupRequest {
    string backup_path = 1;    // 备份目标路径（留空则自动生成）
    bool flush_first = 2;      // 备份前先 flush memtable
}

message CreateBackupResponse {
    bool success = 1;
    string error_msg = 2;
    string backup_path = 3;    // 实际备份路径
    uint64 backup_size = 4;    // 备份大小（字节）
    int64 timestamp_unix = 5;  // 备份时间戳
}

message RestoreFromBackupRequest {
    string backup_path = 1;    // 备份源路径
}

message RestoreFromBackupResponse {
    bool success = 1;
    string error_msg = 2;
}

message ListBackupsRequest {
    string backup_dir = 1;     // 备份目录
}

message BackupInfo {
    string path = 1;
    uint64 size = 2;
    int64 created_at_unix = 3;
    string status = 4;         // "complete", "in_progress", "failed"
}

message ListBackupsResponse {
    bool success = 1;
    string error_msg = 2;
    repeated BackupInfo backups = 3;
}

// ============================================================================
// 热点检测
// ============================================================================

message GetHotSpotsRequest {
    uint32 top_n = 1;  // 返回前N个热点（默认20）
}

message HotSpotInfo {
    uint64 entity_id = 1;
    uint32 column_id = 2;
    uint64 query_count = 3;
    int64 last_query_unix = 4;
}

message GetHotSpotsResponse {
    bool success = 1;
    string error_msg = 2;
    repeated HotSpotInfo hot_spots = 3;
    uint64 total_tracked_entities = 4;
}

message ResetHotSpotStatsRequest {}
message ResetHotSpotStatsResponse {
    bool success = 1;
}

// ============================================================================
// Label-based batch entity scan
// ============================================================================

message ScanLabelRequest {
    string space_name = 1;
    string label = 2;
    uint64 min_id = 3;
    uint64 max_id = 4;
    uint64 limit = 5;
}

message ScanLabelResponse {
    bool success = 1;
    string error_message = 2;
    repeated uint64 entity_ids = 3;
}

// ============================================================================
// 存储容量监控
// ============================================================================

message GetStorageCapacityRequest {}

message GetStorageCapacityResponse {
    bool success = 1;
    string error_msg = 2;
    uint64 total_disk_bytes = 3;
    uint64 used_disk_bytes = 4;
    uint64 available_disk_bytes = 5;
    uint64 db_size_bytes = 6;
    double disk_usage_percent = 7;
    bool is_warning = 8;      // > 80% usage
    bool is_critical = 9;     // > 90% usage
    // Component sizes
    uint64 memtable_size = 10;
    uint64 sst_size = 11;
    uint64 wal_size = 12;
    uint64 sst_count = 13;
}
