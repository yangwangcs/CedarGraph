syntax = "proto3";

package cedar.meta;

// gRPC service defined below

// ============================================================================
// 基础类型
// ============================================================================

message SpaceDef {
    string name = 1;
    uint32 partition_num = 2;
    uint32 replica_factor = 3;
    int64 created_at_unix = 4;
}

message PartitionAssignment {
    uint32 partition_id = 1;
    string space_name = 2;
    uint32 leader_node = 3;
    repeated uint32 follower_nodes = 4;
    uint64 version = 5;
    int64 last_updated_unix = 6;
    uint32 state = 7;  // 0=Normal, 1=Migrating, 2=Offline
}

message SpacePartitionMap {
    string space_name = 1;
    uint32 num_partitions = 2;
    uint32 replication_factor = 3;
    map<uint32, PartitionAssignment> assignments = 4;
    uint64 version = 5;
}

message NodeInfo {
    uint32 node_id = 1;
    string address = 2;
    string data_path = 3;
    uint32 num_cpu_cores = 4;
    uint64 total_memory_bytes = 5;
    uint64 total_disk_bytes = 6;
    int64 registered_at_unix = 7;
    int64 last_heartbeat_unix = 8;
    string state = 9;  // ONLINE, OFFLINE, SUSPECTED
}

message NodeStatus {
    uint32 node_id = 1;
    double cpu_usage_percent = 2;
    double memory_usage_percent = 3;
    double disk_usage_percent = 4;
    uint64 qps = 5;
    uint64 latency_ms = 6;
    repeated uint32 leader_partitions = 7;
    repeated uint32 follower_partitions = 8;
    int64 timestamp_unix = 9;
}

// ============================================================================
// 请求/响应
// ============================================================================

message CreateSpaceRequest {
    SpaceDef space = 1;
}

message CreateSpaceResponse {
    bool success = 1;
    string error_msg = 2;
}

message GetSpaceRequest {
    string space_name = 1;
}

message GetSpaceResponse {
    bool success = 1;
    string error_msg = 2;
    SpaceDef space = 3;
}

message GetPartitionAssignmentRequest {
    string space_name = 1;
    uint32 partition_id = 2;
}

message GetPartitionAssignmentResponse {
    bool success = 1;
    string error_msg = 2;
    PartitionAssignment assignment = 3;
}

message UpdatePartitionAssignmentRequest {
    PartitionAssignment assignment = 1;
}

message UpdatePartitionAssignmentResponse {
    bool success = 1;
    string error_msg = 2;
    uint64 version = 3;
}

message GetSpacePartitionMapRequest {
    string space_name = 1;
}

message GetSpacePartitionMapResponse {
    bool success = 1;
    string error_msg = 2;
    SpacePartitionMap partition_map = 3;
}

message RegisterNodeRequest {
    NodeInfo node_info = 1;
}

message RegisterNodeResponse {
    bool success = 1;
    string error_msg = 2;
    string leader_address = 3;  // Set when follower redirects to leader
}

message HeartbeatRequest {
    NodeStatus status = 1;
}

message HeartbeatResponse {
    bool success = 1;
    string error_msg = 2;
}

message GetNodeRequest {
    uint32 node_id = 1;
}

message GetNodeResponse {
    bool success = 1;
    string error_msg = 2;
    NodeInfo node_info = 3;
}

message GetAliveNodesRequest {}

message GetAliveNodesResponse {
    bool success = 1;
    string error_msg = 2;
    repeated NodeInfo nodes = 3;
}

message ListSpacesRequest {}

message ListSpacesResponse {
    bool success = 1;
    string error_msg = 2;
    repeated SpaceDef spaces = 3;
}

message ListLabelsRequest {
    string space_name = 1;
}

message ListLabelsResponse {
    bool success = 1;
    string error_msg = 2;
    repeated LabelSchema labels = 3;
}

message RegisterQueryDRequest {
    string listen_address = 1;
}

message RegisterQueryDResponse {
    bool success = 1;
    string error_msg = 2;
}

message QueryDHeartbeatRequest {
    uint32 active_queries = 1;
    uint32 queued_queries = 2;
}

message QueryDHeartbeatResponse {
    bool success = 1;
    string error_msg = 2;
}

// ============================================================================
// GraphD 管理 - 支持多实例负载均衡
// ============================================================================

message GraphDNodeInfo {
    string address = 1;
    uint32 port = 2;
    string version = 3;
    uint32 max_qps = 4;           // 最大 QPS 容量
    uint32 current_qps = 5;       // 当前 QPS
    uint32 active_queries = 6;    // 活跃查询数
    uint32 queued_queries = 7;    // 排队查询数
    double cpu_usage = 8;         // CPU 使用率
    double memory_usage = 9;      // 内存使用率
    int64 registered_at_unix = 10;
    int64 last_heartbeat_unix = 11;
    string state = 12;            // ONLINE, OFFLINE, BUSY
    map<string, string> metadata = 13;  // 扩展元数据
}

message RegisterGraphDRequest {
    GraphDNodeInfo node_info = 1;
}

message RegisterGraphDResponse {
    bool success = 1;
    string error_msg = 2;
    string node_id = 3;           // MetaD 分配的节点 ID
}

message GraphDHeartbeatRequest {
    string node_id = 1;
    uint32 current_qps = 2;
    uint32 active_queries = 3;
    uint32 queued_queries = 4;
    double cpu_usage = 5;
    double memory_usage = 6;
}

message GraphDHeartbeatResponse {
    bool success = 1;
    string error_msg = 2;
}

message GetGraphDNodesRequest {
    string state_filter = 1;  // "ONLINE", "BUSY", "" (all)
}

message GetGraphDNodesResponse {
    bool success = 1;
    string error_msg = 2;
    repeated GraphDNodeInfo nodes = 3;
}

message UnregisterGraphDRequest {
    string node_id = 1;
}

message UnregisterGraphDResponse {
    bool success = 1;
    string error_msg = 2;
}

// Watch 请求 - 流式响应
message WatchPartitionMapRequest {
    string space_name = 1;
    uint64 current_version = 2;  // 客户端当前版本
}

message PartitionMapChange {
    string space_name = 1;
    uint32 partition_id = 2;
    string change_type = 3;  // LEADER_CHANGED, REPLICA_ADDED, etc.
    uint32 old_leader = 4;
    uint32 new_leader = 5;
    uint64 version = 6;
    int64 timestamp_unix = 7;
}

// ============================================================================
// GCN Cache Location 管理
// ============================================================================

message CacheWindow {
    uint64 entity_id = 1;
    uint64 cached_from = 2;
    uint64 cached_to = 3;
    uint32 gcn_node_id = 4;
    uint64 version = 5;
    uint64 expire_at = 6;
}

message LocateCacheRequest {
    uint64 entity_id = 1;
    uint64 query_time = 2;
}

message LocateCacheResponse {
    bool found = 1;
    CacheWindow window = 2;
}

message ReportCacheRequest {
    CacheWindow window = 1;
}

message ReportCacheResponse {
    bool success = 1;
    string error_msg = 2;
}

message GcnHeartbeatRequest {
    uint32 gcn_node_id = 1;
    repeated CacheWindow windows = 2;
}

message GcnHeartbeatResponse {
    bool success = 1;
    string error_msg = 2;
}

// ============================================================================
// GCN Lease 控制面
// ============================================================================

enum GcnLeaseStatusCode {
    GCN_LEASE_STATUS_OK = 0;
    GCN_LEASE_STATUS_STALE_INCARNATION = 1;
    GCN_LEASE_STATUS_STALE_LEASE = 2;
    GCN_LEASE_STATUS_NO_ELIGIBLE_GCN = 3;
    GCN_LEASE_STATUS_NOT_LEADER = 4;
    GCN_LEASE_STATUS_INVALID_ARGUMENT = 5;
    GCN_LEASE_STATUS_INTERNAL_ERROR = 6;
}

message GcnPartitionProgress {
    uint32 partition_id = 1;
    uint64 partition_epoch = 2;
    uint64 applied_offset = 3;
    uint64 applied_version = 4;
    bool query_ready = 5;
}

message GcnPartitionLease {
    uint32 partition_id = 1;
    uint64 gcn_id = 2;
    uint64 lease_epoch = 3;
    uint64 expires_at_ms = 4;
    string lease_token = 5;
}

message GcnRoute {
    uint32 partition_id = 1;
    uint64 gcn_id = 2;
    string endpoint = 3;
    uint64 lease_epoch = 4;
    uint64 applied_version = 5;
    uint64 expires_at_ms = 6;
}

message RegisterGcnRequest {
    uint64 gcn_id = 1;
    string endpoint = 2;
    uint64 incarnation = 3;
    uint64 last_heartbeat_ms = 4;
}

message RegisterGcnResponse {
    bool success = 1;
    string error_msg = 2;
    GcnLeaseStatusCode status_code = 3;
    string leader_address = 4;
}

message RenewGcnLeasesRequest {
    uint64 gcn_id = 1;
    uint64 incarnation = 2;
    repeated GcnPartitionProgress progress = 3;
}

message RenewGcnLeasesResponse {
    bool success = 1;
    string error_msg = 2;
    GcnLeaseStatusCode status_code = 3;
    string leader_address = 4;
    repeated GcnPartitionLease leases = 5;
}

message LocateGcnRequest {
    uint32 partition_id = 1;
    uint64 required_version = 2;
}

message LocateGcnResponse {
    bool success = 1;
    string error_msg = 2;
    GcnLeaseStatusCode status_code = 3;
    string leader_address = 4;
    GcnRoute route = 5;
}

// ============================================================================
// Meta Service gRPC 服务
// ============================================================================

service MetaService {
    // Space 管理
    rpc CreateSpace(CreateSpaceRequest) returns (CreateSpaceResponse);
    rpc GetSpace(GetSpaceRequest) returns (GetSpaceResponse);
    rpc ListSpaces(ListSpacesRequest) returns (ListSpacesResponse);
    
    // 分区管理
    rpc GetPartitionAssignment(GetPartitionAssignmentRequest) returns (GetPartitionAssignmentResponse);
    rpc UpdatePartitionAssignment(UpdatePartitionAssignmentRequest) returns (UpdatePartitionAssignmentResponse);
    rpc GetSpacePartitionMap(GetSpacePartitionMapRequest) returns (GetSpacePartitionMapResponse);
    
    // 节点管理
    rpc RegisterNode(RegisterNodeRequest) returns (RegisterNodeResponse);
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
    rpc GetNode(GetNodeRequest) returns (GetNodeResponse);
    rpc GetAliveNodes(GetAliveNodesRequest) returns (GetAliveNodesResponse);
    
    // QueryD 管理
    rpc RegisterQueryD(RegisterQueryDRequest) returns (RegisterQueryDResponse);
    rpc QueryDHeartbeat(QueryDHeartbeatRequest) returns (QueryDHeartbeatResponse);
    
    // GraphD 管理 - 支持多实例负载均衡
    rpc RegisterGraphD(RegisterGraphDRequest) returns (RegisterGraphDResponse);
    rpc GraphDHeartbeat(GraphDHeartbeatRequest) returns (GraphDHeartbeatResponse);
    rpc GetGraphDNodes(GetGraphDNodesRequest) returns (GetGraphDNodesResponse);
    rpc UnregisterGraphD(UnregisterGraphDRequest) returns (UnregisterGraphDResponse);
    
    // Watch 接口 - 流式
    rpc WatchPartitionMap(WatchPartitionMapRequest) returns (stream PartitionMapChange);

    // Schema 管理
    rpc CreateLabelSchema(CreateLabelSchemaRequest) returns (CreateLabelSchemaResponse);
    rpc GetSchema(GetSchemaRequest) returns (GetSchemaResponse);
    rpc ListLabels(ListLabelsRequest) returns (ListLabelsResponse);

    // 索引管理
    rpc CreateIndex(CreateIndexRequest) returns (CreateIndexResponse);
    rpc DropIndex(DropIndexRequest) returns (DropIndexResponse);
    rpc ListIndexes(ListIndexesRequest) returns (ListIndexesResponse);

    // RBAC 角色管理
    rpc CreateRole(CreateRoleRequest) returns (CreateRoleResponse);
    rpc DropRole(DropRoleRequest) returns (DropRoleResponse);
    rpc ListRoles(ListRolesRequest) returns (ListRolesResponse);
    rpc AssignRole(AssignRoleRequest) returns (AssignRoleResponse);
    rpc RevokeRole(RevokeRoleRequest) returns (RevokeRoleResponse);
    rpc GetUserRoles(GetUserRolesRequest) returns (GetUserRolesResponse);

    // GCN Cache 管理
    rpc LocateCache(LocateCacheRequest) returns (LocateCacheResponse);
    rpc ReportCache(ReportCacheRequest) returns (ReportCacheResponse);
    rpc GcnHeartbeat(GcnHeartbeatRequest) returns (GcnHeartbeatResponse);

    // GCN Lease 控制面
    rpc RegisterGcn(RegisterGcnRequest) returns (RegisterGcnResponse);
    rpc RenewGcnLeases(RenewGcnLeasesRequest) returns (RenewGcnLeasesResponse);
    rpc LocateGcn(LocateGcnRequest) returns (LocateGcnResponse);
}

// ============================================================================
// Schema 管理
// ============================================================================

message PropertyDef {
    string name = 1;
    string type = 2;  // STRING, INT, FLOAT, BOOL, etc.
    bool nullable = 3;
    bool indexed = 4;
}

message LabelSchema {
    string name = 1;
    repeated PropertyDef properties = 2;
    repeated string indexes = 3;
}

message CreateLabelSchemaRequest {
    string space_name = 1;
    LabelSchema schema = 2;
}

message CreateLabelSchemaResponse {
    bool success = 1;
    string error_msg = 2;
}

message GetSchemaRequest {
    string space_name = 1;
    repeated string labels = 2;  // empty = all labels
}

message GetSchemaResponse {
    bool success = 1;
    string error_msg = 2;
    repeated LabelSchema labels = 3;
}

// ============================================================================
// 索引管理
// ============================================================================

message IndexDef {
    string name = 1;
    string label_name = 2;       // TAG or EDGE type name
    repeated string properties = 3;  // indexed property names
    string space_name = 4;
    bool unique = 5;
}

message CreateIndexRequest {
    string space_name = 1;
    IndexDef index = 2;
}

message CreateIndexResponse {
    bool success = 1;
    string error_msg = 2;
}

message DropIndexRequest {
    string space_name = 1;
    string index_name = 2;
}

message DropIndexResponse {
    bool success = 1;
    string error_msg = 2;
}

message ListIndexesRequest {
    string space_name = 1;
    string label_name = 2;  // optional filter
}

message ListIndexesResponse {
    bool success = 1;
    string error_msg = 2;
    repeated IndexDef indexes = 3;
}

// ============================================================================
// RBAC 角色管理
// ============================================================================

message RoleDef {
    string name = 1;
    string description = 2;
    uint32 permissions = 3;  // Permission bitmask
    repeated string allowed_resources = 4;
    repeated string denied_resources = 5;
}

message CreateRoleRequest {
    RoleDef role = 1;
}

message CreateRoleResponse {
    bool success = 1;
    string error_msg = 2;
}

message DropRoleRequest {
    string role_name = 1;
}

message DropRoleResponse {
    bool success = 1;
    string error_msg = 2;
}

message ListRolesRequest {}

message ListRolesResponse {
    bool success = 1;
    string error_msg = 2;
    repeated RoleDef roles = 3;
}

message AssignRoleRequest {
    string user_id = 1;
    string role_name = 2;
}

message AssignRoleResponse {
    bool success = 1;
    string error_msg = 2;
}

message RevokeRoleRequest {
    string user_id = 1;
    string role_name = 2;
}

message RevokeRoleResponse {
    bool success = 1;
    string error_msg = 2;
}

message GetUserRolesRequest {
    string user_id = 1;
}

message GetUserRolesResponse {
    bool success = 1;
    string error_msg = 2;
    repeated string roles = 3;
    RoleDef effective_role = 4;
}
