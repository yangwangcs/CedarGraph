# CedarGraph Single Node - Quick Test
# 单节点快速测试配置
#
# Usage:
#   docker-compose -f docker-compose.single.yml up -d
#   docker-compose -f docker-compose.single.yml logs -f storaged
#   docker-compose -f docker-compose.single.yml down

version: '3.8'

services:
  # Single MetaD
  metad:
    build: .
    image: cedargraph:latest
    container_name: cedar-metad
    hostname: metad
    environment:
      - NODE_TYPE=metad
      - NODE_ID=1
      - BIND_ADDRESS=0.0.0.0:6000
    volumes:
      - metad_data:/var/lib/cedar/metad
      - ./logs/metad:/var/log/cedar
    ports:
      - "6000:6000"
    networks:
      - cedar-network

  # Single StorageD with auto-recovery
  storaged:
    build: .
    image: cedargraph:latest
    container_name: cedar-storaged
    hostname: storaged
    environment:
      - NODE_TYPE=storaged
      - NODE_ID=1
      - BIND_ADDRESS=0.0.0.0:7000
      - METAD_ENDPOINTS=1:metad:6000
      - AUTO_RECOVERY=true
      - HEALTH_CHECK_INTERVAL=30
      - WAIT_FOR_METAD=true
    volumes:
      - storaged_data:/var/lib/cedar/storage
      - ./logs/storaged:/var/log/cedar
    ports:
      - "7000:7000"
    networks:
      - cedar-network
    depends_on:
      - metad
    restart: unless-stopped

  # QueryD
  queryd:
    build: .
    image: cedargraph:latest
    container_name: cedar-queryd
    hostname: queryd
    environment:
      - NODE_TYPE=queryd
      - BIND_ADDRESS=0.0.0.0:8080
      - STORAGE_ENDPOINTS=storaged:7000
    ports:
      - "8080:8080"
    networks:
      - cedar-network
    depends_on:
      - storaged

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: cedar-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - cedar-network

  grafana:
    image: grafana/grafana:latest
    container_name: cedar-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=cedargraph
    ports:
      - "3000:3000"
    networks:
      - cedar-network
    depends_on:
      - prometheus

volumes:
  metad_data:
  storaged_data:
  prometheus_data:
  grafana_data:

networks:
  cedar-network:
    driver: bridge
