name: Snyk Security Scan

on:
  push:
    branches: [main, master, production-readiness]
  pull_request:
    branches: [main, master]
  schedule:
    # Run every Monday at 00:00 UTC
    - cron: '0 0 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  snyk-fs:
    name: Snyk Filesystem Scan
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: snyk/actions/node@master
        continue-on-error: true
        with:
          args: --sarif-file-output=snyk-fs.sarif

      - name: Upload Snyk scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ always() && env.SNYK_TOKEN != '' && hashFiles('snyk-fs.sarif') != '' }}
        continue-on-error: true
        with:
          sarif_file: snyk-fs.sarif
          category: snyk-fs

  snyk-container:
    name: Snyk Container Scan
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        if: ${{ env.SNYK_TOKEN != '' }}
        continue-on-error: true
        run: docker build -f cedar-docker-compose/Dockerfile -t cedargraph:test .

      - name: Check Docker image availability
        if: ${{ always() && env.SNYK_TOKEN != '' }}
        id: docker-image
        shell: bash
        run: |
          if docker image inspect cedargraph:test >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Snyk to check Docker image
        if: ${{ env.SNYK_TOKEN != '' && steps.docker-image.outputs.available == 'true' }}
        uses: snyk/actions/docker@master
        continue-on-error: true
        with:
          image: cedargraph:test
          args: --sarif-file-output=snyk-container.sarif

      - name: Upload Snyk container scan results
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ always() && env.SNYK_TOKEN != '' && hashFiles('snyk-container.sarif') != '' }}
        continue-on-error: true
        with:
          sarif_file: snyk-container.sarif
          category: snyk-container
