# CedarGraph - 一键部署配置
# 支持自动服务发现和节点注册
#
# 快速开始:
#   git clone https://github.com/cedargraph/cedar-docker-compose.git
#   cd cedar-docker-compose
#   docker-compose up -d
#
# 查看状态:
#   docker-compose ps
#
# 连接集群:
#   ./scripts/cedar-cli.sh -e "SHOW HOSTS"

x-cedar-base: &cedar-base
  image: cedargraph/cedar:${CEDAR_VERSION:-k8s-fix-20260630}
  restart: unless-stopped
  networks:
    - cedar-net

services:
  # ============================================================================
  # Meta Service - 元数据服务 (3节点HA)
  # ============================================================================
  metad0:
    <<: *cedar-base
    container_name: cedar-metad-0
    hostname: metad0
    environment:
      - NODE_ROLE=metad
      - NODE_ID=0
      - DATA_DIR=/data/meta
    volumes:
      - ./data/meta0:/data/meta
      - ./logs/meta0:/logs
    ports:
      - "9559:9559"
      - "10559:10559"
    command: ["--node_id", "1", "--listen", "0.0.0.0:9559", "--grpc_port", "10559", "--data_dir", "/data/meta", "--peer", "1:metad0:9559", "--peer", "2:metad1:9559", "--peer", "3:metad2:9559"]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 10559 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  metad1:
    <<: *cedar-base
    container_name: cedar-metad-1
    hostname: metad1
    environment:
      - NODE_ROLE=metad
      - NODE_ID=1
      - DATA_DIR=/data/meta
    volumes:
      - ./data/meta1:/data/meta
      - ./logs/meta1:/logs
    depends_on:
      metad0:
        condition: service_healthy
    command: ["--node_id", "2", "--listen", "0.0.0.0:9559", "--grpc_port", "10559", "--data_dir", "/data/meta", "--peer", "1:metad0:9559", "--peer", "2:metad1:9559", "--peer", "3:metad2:9559"]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 10559 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  metad2:
    <<: *cedar-base
    container_name: cedar-metad-2
    hostname: metad2
    environment:
      - NODE_ROLE=metad
      - NODE_ID=2
      - DATA_DIR=/data/meta
    volumes:
      - ./data/meta2:/data/meta
      - ./logs/meta2:/logs
    depends_on:
      metad0:
        condition: service_healthy
    command: ["--node_id", "3", "--listen", "0.0.0.0:9559", "--grpc_port", "10559", "--data_dir", "/data/meta", "--peer", "1:metad0:9559", "--peer", "2:metad1:9559", "--peer", "3:metad2:9559"]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 10559 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================================
  # Storage Service - 存储服务
  # ============================================================================
  storaged0:
    <<: *cedar-base
    container_name: cedar-storaged-0
    hostname: storaged0
    environment:
      - NODE_ROLE=storaged
      - NODE_ID=0
      - META_SERVERS=metad0:10559,metad1:10559,metad2:10559
      - DATA_DIR=/data/storage
    volumes:
      - ./data/storage0:/data/storage
      - ./logs/storage0:/logs
    ports:
      - "9779:9779"
    depends_on:
      metad0:
        condition: service_healthy
      metad1:
        condition: service_healthy
      metad2:
        condition: service_healthy
    command: ["--bind", "0.0.0.0", "--data_dir", "/data/storage", "--meta", "metad0:10559,metad1:10559,metad2:10559"]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9779 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  storaged1:
    <<: *cedar-base
    container_name: cedar-storaged-1
    hostname: storaged1
    environment:
      - NODE_ROLE=storaged
      - NODE_ID=1
      - META_SERVERS=metad0:10559,metad1:10559,metad2:10559
      - DATA_DIR=/data/storage
    volumes:
      - ./data/storage1:/data/storage
      - ./logs/storage1:/logs
    depends_on:
      storaged0:
        condition: service_healthy
    command: ["--node_id", "1", "--bind", "0.0.0.0", "--data_dir", "/data/storage", "--meta", "metad0:10559,metad1:10559,metad2:10559"]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9779 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  storaged2:
    <<: *cedar-base
    container_name: cedar-storaged-2
    hostname: storaged2
    environment:
      - NODE_ROLE=storaged
      - NODE_ID=2
      - META_SERVERS=metad0:10559,metad1:10559,metad2:10559
      - DATA_DIR=/data/storage
    volumes:
      - ./data/storage2:/data/storage
      - ./logs/storage2:/logs
    depends_on:
      storaged0:
        condition: service_healthy
    command: ["--node_id", "2", "--bind", "0.0.0.0", "--data_dir", "/data/storage", "--meta", "metad0:10559,metad1:10559,metad2:10559"]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9779 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================================
  # Graph Service - 查询服务 (带自动发现)
  # ============================================================================
  graphd:
    <<: *cedar-base
    container_name: cedar-graphd
    hostname: graphd
    environment:
      - NODE_ROLE=graphd
      - META_SERVERS=metad0:10559,metad1:10559,metad2:10559
      - CEDAR_METAD_ENDPOINT=metad0:10559,metad1:10559,metad2:10559
      - AUTO_DISCOVERY=true
      - QUERY_PORT=9669
      - HEALTH_PORT=9668
      - METRICS_PORT=9667
      - CEDAR_GRAPHD_AUTH_JWT_SECRET=${CEDAR_GRAPHD_AUTH_JWT_SECRET:-dev-only-change-me-32-byte-secret}
      - CEDAR_GRAPHD_AUTH_USER=${CEDAR_GRAPHD_AUTH_USER:-admin}
      - CEDAR_GRAPHD_AUTH_PASSWORD=${CEDAR_GRAPHD_AUTH_PASSWORD:-admin}
      - CEDAR_GRAPHD_AUTH_ROLE=${CEDAR_GRAPHD_AUTH_ROLE:-admin}
      - CEDAR_GRPC_TLS_ENABLED=${CEDAR_GRPC_TLS_ENABLED:-0}
      - CEDAR_GRPC_SERVER_CERT=${CEDAR_GRPC_SERVER_CERT:-/etc/cedar/tls/tls.crt}
      - CEDAR_GRPC_SERVER_KEY=${CEDAR_GRPC_SERVER_KEY:-/etc/cedar/tls/tls.key}
      - CEDAR_GRPC_CA_CERT=${CEDAR_GRPC_CA_CERT:-/etc/cedar/tls/ca.crt}
      - CEDAR_GRPC_MTLS_ENABLED=${CEDAR_GRPC_MTLS_ENABLED:-0}
      - CEDAR_GRPC_CLIENT_CERT=${CEDAR_GRPC_CLIENT_CERT:-/etc/cedar/tls/client.crt}
      - CEDAR_GRPC_CLIENT_KEY=${CEDAR_GRPC_CLIENT_KEY:-/etc/cedar/tls/client.key}
    volumes:
      - ./logs/graphd:/logs
      - ${CEDAR_TLS_DIR:-./certs}:/etc/cedar/tls:ro
    ports:
      - "9669:9669"     # 查询端口
      - "9668:9668"     # 健康检查端口
      - "9667:9667"     # 指标端口
    depends_on:
      storaged0:
        condition: service_healthy
      storaged1:
        condition: service_healthy
      storaged2:
        condition: service_healthy
    command: ["--bind", "0.0.0.0", "--meta", "metad0:10559,metad1:10559,metad2:10559"]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9669 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================================
  # Console - 命令行客户端 (内置)
  # ============================================================================
  console:
    <<: *cedar-base
    container_name: cedar-console
    environment:
      - NODE_ROLE=console
    entrypoint: []
    command: ["sh", "-c", "echo 'CedarGraph console ready. Use cedar-cli to connect.' && sleep infinity"]
    depends_on:
      graphd:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # ============================================================================
  # Studio - Web 可视化界面 (可选)
  # ============================================================================
  studio:
    image: cedargraph/studio:${CEDAR_VERSION:-k8s-fix-20260630}
    container_name: cedar-studio
    environment:
      - CEDAR_GRAPHD_HOST=graphd
      - CEDAR_GRAPHD_PORT=9669
    ports:
      - "7001:7001"
    networks:
      - cedar-net
    depends_on:
      graphd:
        condition: service_healthy
    profiles:
      - studio

networks:
  cedar-net:
    driver: bridge
