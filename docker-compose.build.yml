# CedarGraph Build & Run Docker Compose
# 在容器内编译并运行 CedarGraph

services:
  # MetaD 主节点 (带编译环境)
  metad0:
    image: ubuntu:22.04
    container_name: cedar-metad-0
    hostname: metad0
    working_dir: /build
    volumes:
      - .:/build
      - ./data/meta0:/data/meta
    ports:
      - "19559:9559"
    networks:
      - cedar-net
    command: >
      bash -c "
        apt-get update -qq && 
        apt-get install -y -qq build-essential cmake git wget curl liblz4-dev libgrpc++-dev protobuf-compiler-grpc libprotobuf-dev protobuf-compiler libprotoc-dev libssl-dev libyaml-cpp-dev libgflags-dev libgoogle-glog-dev libgtest-dev libleveldb-dev libsnappy-dev pkg-config > /dev/null 2>&1 &&
        echo 'Build dependencies installed' &&
        cd /build/third_party/brpc && mkdir -p build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DBUILD_BRPC_TOOLS=OFF && make -j1 && make install &&
        cd /build/third_party/braft && mkdir -p build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF && make -j1 && make install &&
        cd /build && mkdir -p build_linux && cd build_linux && cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF && make -j1 cedar-metad &&
        echo 'MetaD built successfully' &&
        /build/build_linux/cedar-metad --bind=0.0.0.0:9559 --data_dir=/data/meta
      "

  # MetaD 节点 1
