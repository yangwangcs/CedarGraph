        cd /build/third_party/braft && mkdir -p build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF && make -j1 && make install &&
        cd /build && mkdir -p build_linux && cd build_linux && cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF && make -j1 cedar-metad &&
        echo 'MetaD-1 built successfully' &&
        /build/build_linux/cedar-metad --bind=0.0.0.0:9559 --data_dir=/data/meta
