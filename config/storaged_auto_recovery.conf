# CedarGraph Storage Server Configuration with Auto Recovery
# 带有自动恢复功能的存储服务配置

# Node identity
node_id=1
bind_address=0.0.0.0:7000
data_dir=/tmp/cedar/storage

# MetaD endpoints
metad_endpoints=1:127.0.0.1:6000,2:127.0.0.1:6001,3:127.0.0.1:6002

# Performance tuning
io_threads=4
worker_threads=8

# Peer addresses for health monitoring (comma-separated)
# 用于健康监控的节点地址
peer_addresses=127.0.0.1:7001,127.0.0.1:7002

# Automated Recovery Settings
# 自动恢复设置
enable_auto_recovery=true
health_check_interval_sec=30
max_recovery_attempts=3

# Recovery actions will be triggered when:
# - Disk space < 10%
# - Memory pressure detected
# - Network partition detected
# - Node unreachable
# - Raft leader election failure
