# MetaD Node 2 Configuration

[node]
id = 2
name = "metad-2"
listen_address = "127.0.0.1:2380"
advertise_address = "127.0.0.1:2380"
data_dir = "/tmp/cedar/metad/node2"

[raft]
enable = true
listen_address = "127.0.0.1:9092"
peers = [
    "127.0.0.1:9091",
    "127.0.0.1:9092",
    "127.0.0.1:9093"
]
election_timeout_ms = 5000
heartbeat_interval_ms = 1000
snapshot_interval_s = 3600

[heartbeat]
heartbeat_timeout_sec = 10
check_interval_sec = 5

[logging]
level = "INFO"
file = "/tmp/cedar/logs/metad_node2.log"
