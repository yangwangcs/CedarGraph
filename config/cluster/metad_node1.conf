# MetaD Node 1 Configuration
# 3-node cluster example

[node]
id = 1
name = "metad-1"
listen_address = "127.0.0.1:2379"
advertise_address = "127.0.0.1:2379"
data_dir = "/tmp/cedar/metad/node1"

[raft]
# Raft consensus configuration
enable = true
listen_address = "127.0.0.1:9091"
peers = [
    "127.0.0.1:9091",  # node 1 (self)
    "127.0.0.1:9092",  # node 2
    "127.0.0.1:9093"   # node 3
]
election_timeout_ms = 5000
heartbeat_interval_ms = 1000
snapshot_interval_s = 3600

[heartbeat]
# Node heartbeat detection
heartbeat_timeout_sec = 10
check_interval_sec = 5

[logging]
level = "INFO"
file = "/tmp/cedar/logs/metad_node1.log"
