# MetaD Node 3 Configuration

[node]
id = 3
name = "metad-3"
listen_address = "127.0.0.1:2381"
advertise_address = "127.0.0.1:2381"
data_dir = "/tmp/cedar/metad/node3"

[raft]
enable = true
listen_address = "127.0.0.1:9093"
peers = [
    "127.0.0.1:9091",
    "127.0.0.1:9092",
    "127.0.0.1:9093"
]
election_timeout_ms = 5000
heartbeat_interval_ms = 1000
snapshot_interval_s = 3600

[heartbeat]
heartbeat_timeout_sec = 10
check_interval_sec = 5

[logging]
level = "INFO"
file = "/tmp/cedar/logs/metad_node3.log"
