# CedarGraph Cluster Configuration
# Load with: <service> --config /path/to/cedar.yaml
# Environment overrides: CEDAR_<SECTION>_<KEY>=value

# =============================================================================
# MetaD - Metadata Service (Raft-based)
# =============================================================================
metad:
  node_id: 1
  listen_address: "0.0.0.0:9559"
  grpc_port: 10559
  data_dir: "/var/lib/cedar/metad"
  peers:
    - "1:127.0.0.1:9559"
    - "2:127.0.0.1:9560"
    - "3:127.0.0.1:9561"
  election_timeout_ms: 300
  heartbeat_interval_ms: 100
  heartbeat_timeout_sec: 10
  heartbeat_check_interval_sec: 5

# =============================================================================
# StorageD - Storage Service
# =============================================================================
storaged:
  node_id: 0
  bind_address: "0.0.0.0"
  port: 9779
  data_dir: "/var/lib/cedar/storaged"
  meta_server: "127.0.0.1:10559"
  heartbeat_interval_sec: 10
  cdc:
    min_retention_hours: 24
    max_retained_bytes: 1073741824
    segment_size_bytes: 67108864
    maintenance_interval_ms: 60000
    max_rpc_records: 4096
    max_rpc_bytes: 4194304

# =============================================================================
# GraphD - Graph Query Router
# =============================================================================
graphd:
  bind_address: "0.0.0.0"
  port: 9669
  meta_server: "127.0.0.1:10559"
  gcn_server: "127.0.0.1:9780"

# =============================================================================
# Cluster-wide Settings
# =============================================================================
cluster:
  name: "cedar-cluster"
  replication_factor: 3
  partition_count: 16

# =============================================================================
# TLS Settings (optional)
# =============================================================================
tls:
  enabled: true
  ca_cert: "/etc/cedar/tls/ca.crt"
  server_cert: "/etc/cedar/tls/tls.crt"
  server_key: "/etc/cedar/tls/tls.key"
  client_cert: "/etc/cedar/tls/client.crt"
  client_key: "/etc/cedar/tls/client.key"

# =============================================================================
# Logging Settings
# =============================================================================
logging:
  level: "INFO"
  format: "json"
  output: "/var/log/cedar"
  max_size_mb: 100
  max_files: 10
