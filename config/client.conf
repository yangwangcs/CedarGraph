# CedarGraph Client Configuration
# ================================

# MetaD Configuration
[metad]
host = localhost
port = 9559

# GraphD Configuration
[graphd]
host = localhost
port = 9669

# StorageD Configuration
[storaged]
host = localhost
port = 9779

# Connection Pool Settings
[connection_pool]
max_connections = 10
timeout_ms = 5000

# Service Discovery Settings
[service_discovery]
enable = true
refresh_interval_ms = 10000

# TLS Settings
[tls]
enable = false
ca_cert_path =
client_cert_path =
client_key_path =

# JWT Authentication Settings
[jwt]
enable = false
secret_key = your-secret-key-here
issuer = cedar-client
audience = cedar-server
expiration_seconds = 3600
token =

# Logging Settings
[logging]
enable = true
level = INFO
file_path =
console = true
file = false
