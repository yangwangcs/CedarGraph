# CedarGraph Alertmanager Configuration
# 告警管理器配置

global:
  # NOTE: Configure a real SMTP relay or use null sink for container env.
  # 'localhost:587' will not work inside a container.
  smtp_smarthost: 'null-sink:25'
  smtp_from: 'alerts@cedargraph.io'
  smtp_auth_username: ''
  smtp_auth_password: ''

# Templates
templates:
- '/etc/alertmanager/templates/*.tmpl'

# Route configuration
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'
  routes:
    # Critical alerts go to pagerduty
    - match:
        severity: critical
      receiver: 'pagerduty'
      continue: true
    
    # Warning alerts go to Slack
    - match:
        severity: warning
      receiver: 'slack'
      continue: true

# Receivers
receivers:
  - name: 'default'
    email_configs:
      - to: 'ops@cedargraph.io'
        headers:
          Subject: 'CedarGraph Alert: {{ .GroupLabels.alertname }}'
        html: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Instance: {{ .Labels.instance }}
          Time: {{ .StartsAt }}
          {{ end }}

  - name: 'slack'
    slack_configs:
      # NOTE: Replace with actual Slack webhook URL before deployment.
      # Alertmanager does NOT perform shell variable expansion.
      # Use an init container or config-reloader to inject real values.
      - api_url: 'https://hooks.slack.com/services/PLACEHOLDER'
        channel: '#cedar-alerts'
        title: 'CedarGraph Alert'
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          Instance: {{ .Labels.instance }}
          {{ end }}

  - name: 'pagerduty'
    pagerduty_configs:
      # NOTE: Replace with actual PagerDuty integration key before deployment.
      - service_key: 'PLACEHOLDER'
        description: '{{ .GroupLabels.alertname }}'

# Inhibit rules
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']
