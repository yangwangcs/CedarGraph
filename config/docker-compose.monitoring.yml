# CedarGraph Monitoring Stack
# 监控栈 Docker Compose 配置
# Usage: docker-compose -f docker-compose.monitoring.yml up -d
# NOTE: Set GRAFANA_PASSWORD in your environment before running:
#   export GRAFANA_PASSWORD=$(openssl rand -base64 24)

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: cedar-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./cedar_alerts.yml:/etc/prometheus/rules/cedar_alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - cedar-monitoring

  grafana:
    image: grafana/grafana:11.4.0
    container_name: cedar-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - cedar-monitoring

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: cedar-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    networks:
      - cedar-monitoring

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: cedar-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    networks:
      - cedar-monitoring

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  cedar-monitoring:
    driver: bridge
