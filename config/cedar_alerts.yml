# CedarGraph Alert Rules
# 告警规则

groups:
  - name: cedar_storage_alerts
    interval: 30s
    rules:
      # Storage scrape target down.
      - alert: CedarStorageNodeDown
        expr: up{job="cedar-storage"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "CedarGraph storage node {{ $labels.instance }} is down"
          description: "Storage node has been down for more than 1 minute."

      # GraphD scrape target down.
      - alert: CedarGraphDNodeDown
        expr: up{job="cedar-graphd"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "CedarGraph GraphD node {{ $labels.instance }} is down"
          description: "GraphD metrics target has been down for more than 1 minute."

      # Disk space is exported as total/free bytes by MetricsCollector.
      - alert: CedarDiskSpaceLow
        expr: 100 * (1 - cedar_disk_free_bytes / cedar_disk_total_bytes) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Storage node {{ $labels.instance }} disk space low"
          description: "Disk usage is above 80% (current: {{ $value }}%)"

      - alert: CedarDiskSpaceCritical
        expr: 100 * (1 - cedar_disk_free_bytes / cedar_disk_total_bytes) > 90
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Storage node {{ $labels.instance }} disk space critical"
          description: "Disk usage is above 90% (current: {{ $value }}%)"

      # Process memory warning. Tune the absolute threshold per deployment size.
      - alert: CedarMemoryHigh
        expr: cedar_process_memory_bytes > 8589934592
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CedarGraph process memory high on {{ $labels.instance }}"
          description: "Process RSS is above 8GiB (current bytes: {{ $value }}). Tune threshold for larger nodes."

      # Performance degradation using real histogram metrics.
      - alert: CedarStoragePutLatencyHigh
        expr: histogram_quantile(0.99, rate(cedar_storage_put_latency_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High StorageD put latency on {{ $labels.instance }}"
          description: "P99 put latency is above 1 second."

      - alert: CedarStorageGetLatencyHigh
        expr: histogram_quantile(0.99, rate(cedar_storage_get_latency_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High StorageD get latency on {{ $labels.instance }}"
          description: "P99 get latency is above 1 second."
