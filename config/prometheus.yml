# CedarGraph Prometheus Monitoring Configuration for Docker Compose

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/cedar_alerts.yml

scrape_configs:
  - job_name: cedar-metad
    metrics_path: /metrics
    static_configs:
      - targets:
          - metad0:10559
          - metad1:10559
          - metad2:10559

  - job_name: cedar-storage
    metrics_path: /metrics
    static_configs:
      - targets:
          - storaged0:7001
          - storaged1:7001
          - storaged2:7001

  - job_name: cedar-graphd
    metrics_path: /metrics
    static_configs:
      - targets:
          - graphd:9667
