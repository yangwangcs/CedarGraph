apiVersion: v1
kind: ConfigMap
metadata:
  name: storaged-config
  namespace: cedargraph
data:
  storaged.conf: |
    storaged:
      node_id: 0
      bind_address: "0.0.0.0"
      port: 9779
      data_dir: "/var/lib/cedar/storage"
      meta_server: "metad:10559"
      health_port: 7000
      metrics_port: 7001

    tls:
      enabled: true
