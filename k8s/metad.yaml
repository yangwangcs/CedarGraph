apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: metad
  namespace: cedargraph
  labels:
    app: metad
    app.kubernetes.io/name: metad
    app.kubernetes.io/component: metadata
    app.kubernetes.io/part-of: cedargraph
spec:
  serviceName: metad
  replicas: 3
  selector:
    matchLabels:
      app: metad
  template:
    metadata:
      labels:
        app: metad
        app.kubernetes.io/name: metad
        app.kubernetes.io/component: metadata
        app.kubernetes.io/part-of: cedargraph
    spec:
      containers:
      - name: metad
        image: cedargraph:k8s-fix-20260630
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          ordinal="${HOSTNAME##*-}"
          node_id=$((ordinal + 1))
          exec /usr/local/bin/cedar-metad \
            --node_id "${node_id}" \
            --listen "0.0.0.0:9559" \
            --grpc_port "10559" \
            --data_dir "/var/lib/cedar/metad" \
            --peer "1:metad-0.metad:9559" \
            --peer "2:metad-1.metad:9559" \
            --peer "3:metad-2.metad:9559"
        env:
        - name: NODE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: BIND_ADDRESS
          value: "0.0.0.0:9559"
        - name: CEDAR_METAD_GRPC_ENDPOINT
          value: "0.0.0.0:10559"
        - name: DATA_DIR
          value: "/var/lib/cedar/metad"
        - name: CLUSTER_ID
          value: "1"
        ports:
        - name: raft
          containerPort: 9559
          protocol: TCP
        - name: grpc
          containerPort: 10559
          protocol: TCP
        livenessProbe:
          tcpSocket:
            port: grpc
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: grpc
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        volumeMounts:
        - name: data
          mountPath: /var/lib/cedar/metad
        - name: config
          mountPath: /etc/cedar
      volumes:
      - name: config
        configMap:
          name: metad-config
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: metad
  namespace: cedargraph
  labels:
    app: metad
spec:
  selector:
    app: metad
  ports:
  - name: raft
    port: 9559
    targetPort: 9559
  - name: grpc
    port: 10559
    targetPort: 10559
  clusterIP: None
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: metad-config
  namespace: cedargraph
data:
  metad.conf: |
    metad:
      node_id: 1
      listen_address: "0.0.0.0:9559"
      grpc_port: 10559
      data_dir: "/var/lib/cedar/metad"
      peers:
        - "1:metad-0.metad:9559"
        - "2:metad-1.metad:9559"
        - "3:metad-2.metad:9559"
      election_timeout_ms: 1000
      heartbeat_interval_ms: 100
