apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: storaged
  namespace: cedargraph
  labels:
    app: storaged
    app.kubernetes.io/name: storaged
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: cedargraph
spec:
  serviceName: storaged
  replicas: 3
  selector:
    matchLabels:
      app: storaged
  template:
    metadata:
      labels:
        app: storaged
        app.kubernetes.io/name: storaged
        app.kubernetes.io/component: storage
        app.kubernetes.io/part-of: cedargraph
    spec:
      containers:
      - name: storaged
        image: cedargraph:k8s-fix-20260630
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          ordinal="${HOSTNAME##*-}"
          exec /usr/local/bin/cedar-storaged \
            --node_id "${ordinal}" \
            --port "9779" \
            --bind "0.0.0.0" \
            --data_dir "/var/lib/cedar/storage" \
            --meta "metad:10559" \
            --health_port "7000" \
            --metrics_port "7001"
        env:
        - name: NODE_TYPE
          value: "storaged"
        - name: NODE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: BIND_ADDRESS
          value: "0.0.0.0:9779"
        - name: CEDAR_ADVERTISE_ADDRESS
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: DATA_DIR
          value: "/var/lib/cedar/storage"
        - name: CEDAR_METAD_ENDPOINT
          value: "metad:10559"
        - name: AUTO_RECOVERY
          value: "true"
        - name: HEALTH_CHECK_INTERVAL
          value: "30"
        - name: IO_THREADS
          value: "4"
        - name: WORKER_THREADS
          value: "8"
        ports:
        - name: grpc
          containerPort: 9779
          protocol: TCP
        - name: health
          containerPort: 7000
          protocol: TCP
        - name: metrics
          containerPort: 7001
          protocol: TCP
        livenessProbe:
          tcpSocket:
            port: health
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: health
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        volumeMounts:
        - name: data
          mountPath: /var/lib/cedar/storage
        - name: logs
          mountPath: /var/log/cedar
        - name: config
          mountPath: /etc/cedar
      volumes:
      - name: logs
        emptyDir: {}
      - name: config
        configMap:
          name: storaged-config
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: storaged
  namespace: cedargraph
  labels:
    app: storaged
spec:
  selector:
    app: storaged
  ports:
  - name: grpc
    port: 9779
    targetPort: 9779
  - name: health
    port: 7000
    targetPort: 7000
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: storaged-metrics
  namespace: cedargraph
  labels:
    app: storaged
    prometheus.io/scrape: "true"
spec:
  selector:
    app: storaged
  ports:
  - name: metrics
    port: 7001
    targetPort: 7001
  type: ClusterIP
