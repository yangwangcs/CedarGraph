apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: storaged
  namespace: cedargraph
  labels:
    app: storaged
    app.kubernetes.io/name: storaged
    app.kubernetes.io/component: storage
spec:
  serviceName: storaged
  replicas: 3
  selector:
    matchLabels:
      app: storaged
  template:
    metadata:
      labels:
        app: storaged
        app.kubernetes.io/name: storaged
        app.kubernetes.io/component: storage
    spec:
      containers:
      - name: storaged
        image: cedargraph:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: NODE_TYPE
          value: "storaged"
        - name: NODE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: BIND_ADDRESS
          value: "0.0.0.0:7000"
        - name: DATA_DIR
          value: "/var/lib/cedar/storage"
        - name: METAD_ENDPOINTS
          value: "1:metad-0.metad:6000,2:metad-1.metad:6001,3:metad-2.metad:6002"
        - name: AUTO_RECOVERY
          value: "true"
        - name: HEALTH_CHECK_INTERVAL
          value: "30"
        - name: IO_THREADS
          value: "4"
        - name: WORKER_THREADS
          value: "8"
        ports:
        - name: grpc
          containerPort: 7000
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        livenessProbe:
          exec:
            command:
            - /usr/local/bin/cedar_health_monitor.sh
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - /usr/local/bin/cedar_health_monitor.sh
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        volumeMounts:
        - name: data
          mountPath: /var/lib/cedar/storage
        - name: logs
          mountPath: /var/log/cedar
        - name: config
          mountPath: /etc/cedar
      volumes:
      - name: logs
        emptyDir: {}
      - name: config
        configMap:
          name: storaged-config
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: storaged
  namespace: cedargraph
  labels:
    app: storaged
spec:
  selector:
    app: storaged
  ports:
  - name: grpc
    port: 7000
    targetPort: 7000
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: storaged-metrics
  namespace: cedargraph
  labels:
    app: storaged
    prometheus.io/scrape: "true"
spec:
  selector:
    app: storaged
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
  type: ClusterIP
