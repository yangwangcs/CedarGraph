apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cedargraph-network-policy
  namespace: cedargraph
spec:
  podSelector:
    matchLabels:
      app: cedargraph
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: cedargraph
      ports:
        - protocol: TCP
          port: 9559
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: cedargraph
