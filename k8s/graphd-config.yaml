apiVersion: v1
kind: ConfigMap
metadata:
  name: graphd-config
  namespace: cedargraph
data:
  graphd.conf: |
    graphd:
      bind_address: "0.0.0.0"
      port: 9669
      meta_server: "metad:10559"
      gcn_server: "gcn:9780"
      health_port: 9668
      metrics_port: 9667

    tls:
      enabled: true
