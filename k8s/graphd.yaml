apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphd
  namespace: cedargraph
  labels:
    app: graphd
    app.kubernetes.io/part-of: cedargraph
spec:
  replicas: 2
  selector:
    matchLabels:
      app: graphd
  template:
    metadata:
      labels:
        app: graphd
        app.kubernetes.io/part-of: cedargraph
    spec:
      containers:
      - name: graphd
        image: cedargraph:latest
        command: ["/usr/local/bin/cedar-graphd"]
        args: ["--port=9669"]
        env:
        - name: CEDAR_METAD_ENDPOINT
          value: "metad:9559"
        - name: CEDAR_GCN_ENDPOINT
          value: "gcn:9780"
        ports:
        - containerPort: 9669
          name: query
        - containerPort: 9780
          name: gcn
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          tcpSocket:
            port: query
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: query
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: config
          mountPath: /etc/cedar
      volumes:
      - name: config
        configMap:
          name: graphd-config
---
apiVersion: v1
kind: Service
metadata:
  name: graphd
  namespace: cedargraph
spec:
  selector:
    app: graphd
  ports:
  - port: 9669
    targetPort: 9669
    name: query
  type: ClusterIP
