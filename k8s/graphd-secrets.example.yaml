apiVersion: v1
kind: Secret
metadata:
  name: graphd-auth
  namespace: cedargraph
type: Opaque
stringData:
  jwt-secret: "replace-with-at-least-32-bytes-secret"
  user: "admin"
  password: "replace-with-strong-password"
  role: "admin"
---
apiVersion: v1
kind: Secret
metadata:
  name: graphd-tls
  namespace: cedargraph
type: Opaque
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    replace-with-server-certificate
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    replace-with-server-private-key
    -----END PRIVATE KEY-----
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    replace-with-ca-certificate
    -----END CERTIFICATE-----
  client.crt: |
    -----BEGIN CERTIFICATE-----
    replace-with-mtls-client-certificate
    -----END CERTIFICATE-----
  client.key: |
    -----BEGIN PRIVATE KEY-----
    replace-with-mtls-client-private-key
    -----END PRIVATE KEY-----
